name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-22.04
            archive: tar.gz
          - name: Windows x86_64
            os: windows-latest
            archive: zip
          - name: macOS universal
            os: macos-14
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libglib2.0-dev

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cargo build --release --bin hashcalc     --target x86_64-unknown-linux-gnu
          cargo build --release --bin hashcalc-gui --target x86_64-unknown-linux-gnu

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cargo build --release --bin hashcalc     --target x86_64-pc-windows-msvc
          cargo build --release --bin hashcalc-gui --target x86_64-pc-windows-msvc

      - name: Build and create universal binaries (macOS)
        if: matrix.os == 'macos-14'
        run: |
          cargo build --release --bin hashcalc     --target aarch64-apple-darwin
          cargo build --release --bin hashcalc     --target x86_64-apple-darwin
          cargo build --release --bin hashcalc-gui --target aarch64-apple-darwin
          cargo build --release --bin hashcalc-gui --target x86_64-apple-darwin
          mkdir universal
          lipo -create \
            target/aarch64-apple-darwin/release/hashcalc \
            target/x86_64-apple-darwin/release/hashcalc \
            -output universal/hashcalc
          lipo -create \
            target/aarch64-apple-darwin/release/hashcalc-gui \
            target/x86_64-apple-darwin/release/hashcalc-gui \
            -output universal/hashcalc-gui

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          dir="hashcalc-${{ github.ref_name }}-x86_64-unknown-linux-gnu"
          mkdir "$dir"
          cp target/x86_64-unknown-linux-gnu/release/hashcalc     "$dir/"
          cp target/x86_64-unknown-linux-gnu/release/hashcalc-gui "$dir/"
          tar czf "$dir.tar.gz" "$dir"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $dir = "hashcalc-${{ github.ref_name }}-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\hashcalc.exe"     $dir\
          Copy-Item "target\x86_64-pc-windows-msvc\release\hashcalc-gui.exe" $dir\
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"

      - name: Package (macOS)
        if: matrix.os == 'macos-14'
        run: |
          dir="hashcalc-${{ github.ref_name }}-universal-apple-darwin"
          mkdir "$dir"
          cp universal/hashcalc     "$dir/"
          cp universal/hashcalc-gui "$dir/"
          tar czf "$dir.tar.gz" "$dir"

      - uses: actions/upload-artifact@v4
        with:
          name: hashcalc-${{ matrix.name }}
          path: hashcalc-${{ github.ref_name }}-*.${{ matrix.archive }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
