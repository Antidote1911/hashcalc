name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libglib2.0-dev

      - name: Build
        run: |
          cargo build --release --bin hashcalc --target ${{ matrix.target }}
          cargo build --release --bin hashcalc-gui --target ${{ matrix.target }}

      - name: Package (Linux / macOS)
        if: matrix.archive == 'tar.gz'
        run: |
          dir="hashcalc-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/hashcalc"     "$dir/"
          cp "target/${{ matrix.target }}/release/hashcalc-gui" "$dir/"
          tar czf "$dir.tar.gz" "$dir"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $dir = "hashcalc-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\hashcalc.exe"     $dir\
          Copy-Item "target\${{ matrix.target }}\release\hashcalc-gui.exe" $dir\
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: hashcalc-${{ matrix.target }}
          path: hashcalc-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
